name: Pages Build and Deployment

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Project
        run: echo "Building application"

  report-build-status:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Report Status
        run: echo "Build successful"

  deploy:
    needs: report-build-status
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: echo "Deploying application"
